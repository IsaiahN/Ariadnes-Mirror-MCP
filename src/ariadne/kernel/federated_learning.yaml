description: A machine learning technique that trains an algorithm across multiple
  decentralized edge devices or servers holding local data samples, without exchanging
  them.
domain: Machine Learning / Distributed Systems
falsifiability_note: Predicts that global model performance will converge even when
  data is non-IID (Independent and Identically Distributed) across clients, given
  sufficient rounds.
id: federated_learning
key_refs:
- McMahan, B., et al. (2017). Communication-Efficient Learning of Deep Networks from
  Decentralized Data.
known_failure_modes:
- Poisoning attacks
- Client dropouts
- Communication bottlenecks
name: Federated Learning
scale_level: institutional
f_star_coordinates:
  resource_pressure: 0.6
  actor_complexity: 0.2
  information_asymmetry: 0.9
  coupling_tightness: 0.4
  time_pressure: 0.6
  boundary_permeability: 0.8
distortion_profile:
  resource_type: model weights/gradients
  resource_dynamics: iterative aggregation
  thermodynamic_regime: medium/digital
  physical_constraints: [compute power, network bandwidth]
  actor_intentionality: none (protocol followers)
  actor_count_regime: massive
  actor_autonomy: 0.8
  incentive_legibility: 1.0
  boundary_domains: [machine_learning, distributed_systems]
  emergent_problems: [data heterogeneity, poisoning]
  intersection_type: cooperative
coverage:
