theories:
  - id: raft_consensus
    name: Raft Consensus Algorithm
    domain: Computer Science / Distributed Systems
    description: A consensus algorithm designed as an alternative to Paxos. It achieves consensus through leader election, log replication, and safety.
    structural_tags: [hierarchical, peer-to-peer, regulatory, layered]
    structural_topology:
      roles: [Leader, Follower, Candidate]
      directionality: Unidirectional (Leader to Followers)
      feedback_loops: Heartbeats and AppendEntries responses
      scale: Local (cluster-level)
      time_horizon: Reactive (immediate consistency)
    falsifiability_note: Predicts that a cluster cannot reach consensus if more than (N-1)/2 nodes are unavailable or partitioned.
    key_refs: ["Ongaro, D., & Ousterhout, J. (2014). In Search of an Understandable Consensus Algorithm."]
    known_failure_modes: [Livelock during election cycles, Performance degradation under high network latency]

  - id: hayek_price_system
    name: Hayek's Price System
    domain: Economics
    description: Prices act as a communication mechanism to coordinate local knowledge across a market without central planning.
    structural_tags: [market, stigmergic, distributed, predictive]
    structural_topology:
      roles: [Producer, Consumer, Arbitrageur]
      directionality: Peer-to-peer signal propagation
      feedback_loops: Price signals vs. Supply/Demand shifts
      scale: Global (emergent from local actions)
      time_horizon: Dynamic (continuous update)
    falsifiability_note: Predicts that central planning will always result in less efficient resource allocation than a functioning price system for non-trivial economies.
    key_refs: ["Hayek, F. A. (1945). The Use of Knowledge in Society."]
    known_failure_modes: [Price stickiness, Information asymmetry, Market power / Monopolies]

  - id: adaptive_immune_system
    name: Adaptive Immune System
    domain: Biology
    description: A system that recognizes and remembers specific pathogens to provide long-lasting protection.
    structural_tags: [evolutionary, adversarial, predictive, modular]
    structural_topology:
      roles: [Antigen, Antibody, B-Cell, T-Cell, Memory Cell]
      directionality: Recognition-Response cycle
      feedback_loops: Clonal selection and expansion
      scale: Global (organism-level)
      time_horizon: Long-term (memory retention)
    falsifiability_note: Predicts that a secondary exposure to the same pathogen will result in a faster and stronger response than the primary exposure.
    key_refs: ["Janeway, C. A. (2001). Immunobiology: The Immune System in Health and Disease."]
    known_failure_modes: [Autoimmunity (self-recognition), Pathogen mimicry, Cytokine storm]

  - id: principal_agent_theory
    name: Principal-Agent Theory
    domain: Economics / Sociology
    description: Explores the challenges when one person (the agent) is able to make decisions on behalf of another person (the principal), leading to moral hazard and information asymmetry.
    structural_tags: [hierarchical, adversarial, cooperative, regulatory]
    structural_topology:
      roles: [Principal, Agent]
      directionality: Delegation and Reporting
      feedback_loops: Incentive alignment and Monitoring
      scale: Local (contract-level)
      time_horizon: Strategic
    falsifiability_note: Predicts that agents will prioritize their own interests over the principal's when monitoring costs are high and incentives are misaligned.
    key_refs: ["Ross, S. A. (1973). The Economic Theory of Agency: The Principal's Problem."]
    known_failure_modes: [Excessive monitoring costs, Misalignment of multi-tasking agents]

  - id: punctuated_equilibrium
    name: Punctuated Equilibrium
    domain: Paleontology / Evolutionary Biology
    description: Proposes that most species show little evolutionary change for most of their history (stasis), punctuated by rare, rapid events of branching speciation.
    structural_tags: [evolutionary, cyclic, layered]
    structural_topology:
      roles: [Species, Environment, Niche]
      directionality: Evolutionary radiation
      feedback_loops: Environmental pressure vs. Species stasis
      scale: Global (macroevolutionary)
      time_horizon: Geologic
    falsifiability_note: Predicts the absence of transitional fossils for many lineages in the fossil record due to the speed of speciation events.
    key_refs: ["Gould, S. J., & Eldredge, N. (1972). Punctuated equilibria: an alternative to phyletic gradualism."]
    known_failure_modes: [Small population drift, Rapid environmental shifts without speciation]

  - id: small_world_network
    name: Small-World Network
    domain: Network Science
    description: A type of mathematical graph in which most nodes are not neighbors of one another, but the neighbors of any given node are likely to be neighbors of each other and most nodes can be reached from every other node by a small number of hops.
    structural_tags: [network, hub-spoke, distributed]
    structural_topology:
      roles: [Node, Link, Hub, Peripheral Node]
      directionality: Multi-directional
      feedback_loops: Preferential attachment (often associated)
      scale: Global
      time_horizon: Static (often) or Growing
    falsifiability_note: Predicts a low average path length that scales logarithmically with the number of nodes.
    key_refs: ["Watts, D. J., & Strogatz, S. H. (1998). Collective dynamics of 'small-world' networks."]
    known_failure_modes: [Fragility to targeted hub attacks, Congestion in central hubs]

  - id: self_organized_criticality
    name: Self-Organized Criticality (SOC)
    domain: Physics
    description: Systems that naturally evolve toward a critical point where a minor event can trigger an avalanche of any size (e.g., sandpiles, earthquakes).
    structural_tags: [evolutionary, cyclic, stigmergic]
    structural_topology:
      roles: [Component, Threshold, Avalanche]
      directionality: Cascading
      feedback_loops: Stress accumulation vs. Dissipation
      scale: Global (emergent)
      time_horizon: Power-law distributed
    falsifiability_note: Predicts that the size and frequency of events follow a power-law distribution.
    key_refs: ["Bak, P., Tang, C., & Wiesenfeld, K. (1987). Self-organized criticality: An explanation of the 1/f noise."]
    known_failure_modes: [Over-damping, Non-conservative dynamics]

  - id: federated_learning
    name: Federated Learning
    domain: Machine Learning / Distributed Systems
    description: A machine learning technique that trains an algorithm across multiple decentralized edge devices or servers holding local data samples, without exchanging them.
    structural_tags: [hub-spoke, peer-to-peer, distributed, regulatory]
    structural_topology:
      roles: [Central Server, Client Device, Local Model, Global Model]
      directionality: Bidirectional (Local updates to Server, Global model to Clients)
      feedback_loops: Model aggregation and distribution
      scale: Global
      time_horizon: Iterative
    falsifiability_note: Predicts that global model performance will converge even when data is non-IID (Independent and Identically Distributed) across clients, given sufficient rounds.
    key_refs: ["McMahan, B., et al. (2017). Communication-Efficient Learning of Deep Networks from Decentralized Data."]
    known_failure_modes: [Poisoning attacks, Client dropouts, Communication bottlenecks]

  - id: jazz_improvisation
    name: Jazz Improvisation
    domain: Music / Arts
    description: A collaborative process where musicians create music in real-time, balancing individual expression with group coordination via shared structures (e.g., chord progressions).
    structural_tags: [peer-to-peer, distributed, cooperative, evolutionary]
    structural_topology:
      roles: [Soloist, Accompanist, Time-keeper]
      directionality: Multi-directional signaling
      feedback_loops: Listening and Response (call and response)
      scale: Local (ensemble)
      time_horizon: Real-time
    falsifiability_note: Predicts that the quality of the ensemble output depends more on the responsiveness of agents than on pre-defined planning.
    key_refs: ["Berliner, P. F. (1994). Thinking in Jazz: The Infinite Art of Improvisation."]
    known_failure_modes: [Over-divergence (noise), Lack of shared vocabulary, Domination by a single agent]

  - id: ooda_loop
    name: OODA Loop
    domain: Military Strategy / Decision Science
    description: Observe, Orient, Decide, Act. A four-step cycle for decision-making in rapidly changing environments.
    structural_tags: [cyclic, predictive, regulatory, adversarial]
    structural_topology:
      roles: [Observer, Decision Maker, Actor]
      directionality: Cyclic
      feedback_loops: Continuous re-observation after action
      scale: Local/Global
      time_horizon: Real-time/Reactive
    falsifiability_note: Predicts that the agent with a faster OODA loop will consistently outmaneuver opponents regardless of raw resource advantage.
    key_refs: ["Boyd, J. R. (1986). Patterns of Conflict."]
    known_failure_modes: [Analysis paralysis, Mis-orientation due to bias, Feedback delay]

  - id: second_law_thermodynamics
    name: Second Law of Thermodynamics
    domain: Physics
    description: The total entropy of an isolated system can never decrease over time; it can only remain constant or increase.
    structural_tags: [evolutionary, cyclic, regulatory]
    structural_topology:
      roles: [System, Surroundings, Entropy, Energy]
      directionality: Unidirectional (Time arrow)
      feedback_loops: Dissipative processes
      scale: Global (Universal)
      time_horizon: Terminal
    falsifiability_note: Predicts that perpetual motion machines of the second kind are impossible.
    key_refs: ["Clausius, R. (1850). On the Moving Force of Heat."]
    known_failure_modes: [Small-scale fluctuations (Maxwell's Demon), Non-isolated systems (Life)]

  - id: gift_economy
    name: Gift Economy
    domain: Anthropology / Sociology
    description: A mode of exchange where valuables are not sold, but rather given without an explicit agreement for immediate or future rewards.
    structural_tags: [peer-to-peer, cooperative, stigmergic, network]
    structural_topology:
      roles: [Giver, Receiver, Community]
      directionality: Circular/Networked
      feedback_loops: Social prestige and reciprocity
      scale: Local/Global
      time_horizon: Long-term
    falsifiability_note: Predicts that social cohesion and individual status are higher in gift economies than in pure barter economies of the same scale.
    key_refs: ["Mauss, M. (1925). The Gift."]
    known_failure_modes: [Free-riding at scale, Obligation traps, Commodification]

  - id: ess_evolutionary_stable_strategy
    name: Evolutionary Stable Strategy (ESS)
    domain: Biology / Game Theory
    description: A strategy which, if adopted by a population in a given environment, cannot be invaded by any alternative strategy that is initially rare.
    structural_tags: [evolutionary, adversarial, regulatory, modular]
    structural_topology:
      roles: [Strategy, Population, Mutant]
      directionality: Selection pressure
      feedback_loops: Frequency-dependent selection
      scale: Global (population-level)
      time_horizon: Multi-generational
    falsifiability_note: Predicts the convergence of behavioral traits in a population toward a Nash equilibrium that is also evolutionarily stable.
    key_refs: ["Maynard Smith, J. (1982). Evolution and the Theory of Games."]
    known_failure_modes: [Small population drift, Changing environments, Non-transitive interactions]

  - id: red_queen_hypothesis
    name: Red Queen Hypothesis
    domain: Evolutionary Biology
    description: Organisms must constantly adapt, evolve, and proliferate not merely to gain reproductive advantage, but also simply to survive while pitted against ever-evolving opposing organisms in an ever-changing environment.
    structural_tags: [evolutionary, adversarial, cyclic, network]
    structural_topology:
      roles: [Host, Parasite, Predator, Prey]
      directionality: Co-evolutionary feedback
      feedback_loops: Arms race (Adaptation-Counteradaptation)
      scale: Global (Ecosystem)
      time_horizon: Continuous
    falsifiability_note: Predicts that species that stop evolving will quickly go extinct even if their physical environment remains static.
    key_refs: ["Van Valen, L. (1973). A New Evolutionary Law."]
    known_failure_modes: [Abiotic extinction drivers, Stable niches with low competition]

  - id: predictive_processing
    name: Predictive Processing
    domain: Cognitive Science / Neuroscience
    description: The brain is a sophisticated hypothesis-testing mechanism, which is constantly generating models of the world and using them to predict sensory input.
    structural_tags: [predictive, layered, hierarchical, regulatory]
    structural_topology:
      roles: [Generative Model, Prediction Error, Sensory Input]
      directionality: Top-down (predictions) and Bottom-up (errors)
      feedback_loops: Error minimization loop
      scale: Local (neuronal) / Global (behavioral)
      time_horizon: Real-time
    falsifiability_note: Predicts that sensory input matching the internal model will trigger less neural activity than unexpected input.
    key_refs: ["Clark, A. (2013). Whatever next? Predictive brains, situated agents, and the future of cognitive science."]
    known_failure_modes: [Schizophrenia/Hallucinations (over-weighting priors), Sensory deprivation]

  - id: lambda_calculus
    name: Lambda Calculus
    domain: Formal Systems / Mathematics
    description: A formal system in mathematical logic for expressing computation based on function abstraction and application using variable binding and substitution.
    structural_tags: [modular, hierarchical, layered]
    structural_topology:
      roles: [Variable, Abstraction, Application]
      directionality: Reduction (computation)
      feedback_loops: Recursion (Fixed-point combinators)
      scale: Universal (Computational)
      time_horizon: A-temporal
    falsifiability_note: Equivalent to Turing machines (Church-Turing Thesis); predicts that any effectively calculable function can be expressed in lambda calculus.
    key_refs: ["Church, A. (1936). An unsolvable problem of elementary number theory."]
    known_failure_modes: [Halting problem, Computational complexity limits]

  - id: mimetic_desire
    name: Mimetic Desire
    domain: Sociology / Philosophy
    description: Human desire is not autonomous but is borrowed from models; we want what others want because they want it.
    structural_tags: [adversarial, network, peer-to-peer, cyclic]
    structural_topology:
      roles: [Subject, Model/Mediator, Object]
      directionality: Triadic
      feedback_loops: Mimetic rivalry and Scapegoating
      scale: Global (Societal)
      time_horizon: Dynamic
    falsifiability_note: Predicts that conflict will increase between individuals as they become more similar in their desires and social status.
    key_refs: ["Girard, R. (1961). Deceit, Desire and the Novel."]
    known_failure_modes: [Non-rivalrous goods, Strong individualistic values, External mediation]

  - id: percolation_theory
    name: Percolation Theory
    domain: Physics / Mathematics
    description: Describes the behavior of a network when nodes or links are added. As the density of links increases, a large "giant component" suddenly forms.
    structural_tags: [network, layered, distributed]
    structural_topology:
      roles: [Node, Link, Cluster, Giant Component]
      directionality: Multi-directional
      feedback_loops: Positive feedback in connectivity
      scale: Global (Phase transition)
      time_horizon: Critical/Sudden
    falsifiability_note: Predicts a sharp threshold (percolation threshold) below which global connectivity is impossible.
    key_refs: ["Broadbent, S. R., & Hammersley, J. M. (1957). Percolation processes."]
    known_failure_modes: [Non-random networks, Finite-size effects]

  - id: optimal_foraging_theory
    name: Ecology / Behavioral Economics
    domain: Ecology
    description: A behavioral ecology model that helps predict how an animal behaves when searching for food.
    structural_tags: [predictive, market, evolutionary]
    structural_topology:
      roles: [Forager, Patch, Prey]
      directionality: Navigational
      feedback_loops: Resource depletion vs. Search cost
      scale: Local
      time_horizon: Short-term (Tactical)
    falsifiability_note: Predicts that foragers will leave a patch when the rate of intake drops to the average rate for the environment (Marginal Value Theorem).
    key_refs: ["Charnov, E. L. (1976). Optimal foraging, the marginal value theorem."]
    known_failure_modes: [Predation risk, Imperfect information, Bounded rationality]

  - id: minsky_instability
    name: Minsky Instability Hypothesis
    domain: Finance / Macroeconomics
    description: Financial markets are inherently unstable; long periods of stability lead to increased risk-taking, which eventually causes a crash.
    structural_tags: [cyclic, evolutionary, regulatory]
    structural_topology:
      roles: [Hedge borrower, Speculative borrower, Ponzi borrower]
      directionality: Increasing fragility
      feedback_loops: Success breeds disregard for risk
      scale: Global (Market)
      time_horizon: Multi-year (Cycle)
    falsifiability_note: Predicts that financial crises are an endogenous outcome of stable growth periods, not just exogenous shocks.
    key_refs: ["Minsky, H. P. (1992). The Financial Instability Hypothesis."]
    known_failure_modes: [Strong counter-cyclical regulation, Resource-constrained economies]

  - id: panarchy
    name: Panarchy
    domain: Systems Ecology / Resilience
    description: A framework for understanding the cycle of growth, accumulation, restructuring, and renewal in complex social-ecological systems.
    structural_tags: [cyclic, hierarchical, evolutionary, layered]
    structural_topology:
      roles: [Fast/Small levels, Slow/Large levels]
      directionality: Bottom-up (revolt) and Top-down (remember)
      feedback_loops: Adaptive cycle (r, K, Omega, Alpha)
      scale: Multi-scale
      time_horizon: Multi-temporal
    falsifiability_note: Predicts that systems that successfully manage the adaptive cycle are more resilient than those that optimize for a single state.
    key_refs: ["Gunderson, L. H., & Holling, C. S. (2002). Panarchy: Understanding Transformations in Human and Natural Systems."]
    known_failure_modes: [Rigidity traps, Poverty traps]
